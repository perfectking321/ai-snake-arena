<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Snake Arena</title>
  <style>
    :root {
      /* Accent Color Map */
      --color-dqn: #7c6ef7;
      --color-bfs: #3b9eff;
      --color-dfs: #ff7043;
      --color-ucs: #26c6a0;
      --color-astar: #ffd740;
      --color-bestfirst: #e040fb;
      --color-minimax: #ff4081;

      /* UI Theme */
      --bg-color: #0a0a0c;
      --grid-line: #111118;
      --text-main: #ffffff;
      --text-muted: #888899;
      --panel-bg: rgba(255, 255, 255, 0.03);
      --panel-border: rgba(255, 255, 255, 0.08);
      --font-family: 'Inter', system-ui, sans-serif;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-family);
      overflow: hidden; /* Lock native scrolling entirely */
    }

    h1 { font-size: 4rem; font-weight: 800; letter-spacing: -0.05em; margin-bottom: 1rem; text-shadow: 0 4px 12px rgba(0,0,0,0.5); }
    h2 { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 0.5rem; }
    p { color: var(--text-muted); line-height: 1.6; }

    /* --- Hero Section --- */
    #hero {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    #hero-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; opacity: 0.4;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 800px;
      padding: 3rem;
      background: rgba(10, 10, 12, 0.65);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
      border: 1px solid var(--panel-border);
    }

    .subtitle { font-size: 1.25rem; margin-bottom: 2rem; }
    
    .tech-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 3rem;
    }

    .chip {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      padding: 0.5rem 1rem;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 500;
      color: #e2e2ec;
      transition: all 0.3s ease;
    }
    .chip:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }

    .scroll-cta {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      animation: bounce 2s infinite;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.3s;
    }
    .scroll-cta:hover { opacity: 1; }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translate(-50%, 0); }
      40% { transform: translate(-50%, -15px); }
      60% { transform: translate(-50%, -7px); }
    }

    /* --- Hover Cards --- */
    #hero-cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
      opacity: 0; /* Hidden initially for GSAP */
      pointer-events: none; /* Disabled until revealed */
    }
    #hero-cards.active { pointer-events: all; }

    .hero-card {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      padding: 1rem 1.5rem;
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      min-width: 180px;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      border-top: 3px solid var(--card-accent);
      opacity: 0; /* Individual stagger state */
      transform: translateY(20px);
    }
    .hero-card:hover {
      transform: scale(1.05) translateY(-5px) !important;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
      border-color: var(--card-accent);
    }
    .hero-card-title { font-weight: 700; font-size: 1rem; color: var(--text-main); margin-bottom: 0.25rem; }
    .hero-card-sub { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}

    /* --- Side Nav --- */
    #side-nav {
      position: fixed;
      left: -260px; /* Hidden initially */
      top: 0;
      width: 240px;
      height: 100vh;
      background: rgba(10, 10, 12, 0.95);
      border-right: 1px solid var(--panel-border);
      z-index: 100;
      display: flex;
      flex-direction: column;
      padding: 3rem 1.5rem;
      transition: left 0.6s cubic-bezier(0.65, 0, 0.35, 1);
      backdrop-filter: blur(12px);
    }
    #side-nav.active {
      left: 0;
    }
    .side-nav-title {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 2rem;
      padding-left: 1rem;
      font-weight: 700;
    }
    .side-nav-item {
      padding: 0.85rem 1rem;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      margin-bottom: 0.5rem;
      border: 1px solid transparent;
    }
    .side-nav-item:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
    }
    .side-nav-item.active {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      border-color: var(--nav-accent);
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    /* --- Application Layout --- */
    #app-container {
      width: 100vw;
      height: 200vh; /* 100vh Hero + 100vh Slider */
      transform: translateY(0);
      transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
      will-change: transform;
    }

    #main-slider {
      display: flex;
      width: 700vw; /* 7 sections * 100vw */
      height: 100vh;
      transform: translateX(0);
      transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
      will-change: transform;
    }

    /* --- Algo Section --- */
    .algo-section {
      width: 100vw;
      height: 100vh;
      flex-shrink: 0;
      /* Add 240px padding on the left for the sidebar */
      padding: 4rem 2rem 4rem 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .section-header {
      width: 100%;
      max-width: 1200px;
      margin-bottom: 2rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .algo-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      background-color: var(--section-accent);
      box-shadow: 0 0 12px var(--section-accent);
      margin-top: 10px;
    }

    .algo-badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      color: var(--section-accent);
      border: 1px solid var(--section-accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      vertical-align: middle;
      margin-left: 0.5rem;
    }

    .section-title-wrap { flex-grow: 1; }

    .split-layout {
      display: flex;
      width: 100%;
      max-width: 1200px;
      gap: 2rem;
    }
    @media (max-width: 900px) { .split-layout { flex-direction: column; } }

    .panel {
      flex: 1;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .chart-container { flex-grow: 1; position: relative; min-height: 300px; }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .game-canvas {
      background: #0a0a0c;
      border: 1px solid var(--grid-line);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      image-rendering: pixelated; /* Crisp grid lines */
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      width: 100%;
      max-width: 400px;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s;
    }

    .btn-play { background: var(--section-accent); color: #000; flex-grow: 1; }
    .btn-play:hover { filter: brightness(1.2); }
    .btn-play:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

    .btn-stop { background: rgba(255, 68, 68, 0.15); color: #ff4444; border: 1px solid currentColor; }
    .btn-stop:hover { background: rgba(255, 68, 68, 0.25); }
    .btn-stop:disabled { opacity: 0.5; cursor: not-allowed; border-color: transparent; }

    .speed-select {
      background: rgba(255, 255, 255, 0.05);
      color: white;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 0.5rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .speed-select option { background: #1a1a1f; }

    .stat-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-top: 1.5rem;
      width: 100%;
    }

    .stat-card {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .stat-value.accent { color: var(--section-accent); }

    /* Each section defines --section-accent locally */
    #sec-dqn { --section-accent: var(--color-dqn); }
    #sec-bfs { --section-accent: var(--color-bfs); }
    #sec-dfs { --section-accent: var(--color-dfs); }
    #sec-ucs { --section-accent: var(--color-ucs); }
    #sec-astar { --section-accent: var(--color-astar); }
    #sec-bestfirst { --section-accent: var(--color-bestfirst); }
    #sec-minimax { --section-accent: var(--color-minimax); }

<body>

  <nav id="side-nav">
    <div class="side-nav-title">Algorithms</div>
    <div id="side-nav-links"></div>
  </nav>

  <!-- Hero Section -->
  <div id="app-container">
    <section id="hero">

    <video
      id="hero-video"
      autoplay muted loop playsinline
      src="/static/snake_loop.mp4"
    ></video>

    <div id="hero-overlay"></div>

    <div id="hero-text-container">
      <p id="hl-eyebrow">SRMIST · FT3 · AI Project 2026</p>
      <h1 id="hl-1">AI Snake Arena</h1>
      <p id="hl-2">Reinforcement Learning meets Classical AI</p>
      <p id="hl-3">
        A Deep Q-Network agent learns to play Snake from scratch.
        Then BFS, A*, DFS, UCS, and Minimax show how classical
        algorithms change everything.
      </p>
      <div id="hl-4">
        <span class="tech-tag">PyTorch</span>
        <span class="tech-tag">FastAPI</span>
        <span class="tech-tag">WebSocket</span>
        <span class="tech-tag">28-Input State</span>
        <span class="tech-tag">DQN</span>
      </div>

      <div id="hero-cards"></div>
    </div>

    <div id="hero-progress">
      <div id="hero-progress-bar"></div>
    </div>

  </section>

  <!-- Main Container -->
    <div id="main-slider">
      </div>
  </div>

  <script>
    // --- Configuration ---
    const ALGOS = [
      { id: 'dqn', name: 'Pure DQN', badge: 'Deep Q-Network', statLabel: 'epsilon', desc: 'A neural network learning strictly via random exploration and delayed rewards. Fails often early on.' },
      { id: 'bfs', name: 'DQN + BFS', badge: 'Breadth-First Search', statLabel: 'nodes', desc: 'DQN guided by an optimal unweighted shortest-path solver. Explores in all directions equally.' },
      { id: 'dfs', name: 'DQN + DFS', badge: 'Depth-First Search', statLabel: 'nodes', desc: 'DQN guided by an aggressive solver diving deep before backtracking. Often finds sub-optimal twisted paths.' },
      { id: 'ucs', name: 'DQN + UCS', badge: 'Uniform Cost Search', statLabel: 'cost', desc: 'DQN guided by Dijkstra\'s algorithm equivalent on uniform grid.' },
      { id: 'astar', name: 'DQN + A*', badge: 'A* Search', statLabel: 'path', desc: 'DQN guided by A* using Manhattan distance heuristic. Extremely efficient and optimal.' },
      { id: 'bestfirst', name: 'DQN + Best-First', badge: 'Greedy Best-First', statLabel: 'h', desc: 'DQN guided purely by Manhattan distance to food. Can get trapped in concave shapes.' },
      { id: 'minimax', name: 'DQN + Minimax', badge: 'Alpha-Beta Pruning', statLabel: 'depth', desc: 'DQN guided by adversarial search treating the board as a game against a phantom blocker.' }
    ];

    const ACCENTS = {
      'dqn': '#7c6ef7',
      'bfs': '#3b9eff',
      'dfs': '#ff7043',
      'ucs': '#26c6a0',
      'astar': '#ffd740',
      'bestfirst': '#e040fb',
      'minimax': '#ff4081'
    };

    const GRID_SIZE = 16;
    const CANVAS_PX = 400; // 16 * 25
    const CELL_PX = CANVAS_PX / GRID_SIZE;

    // --- Generate Sections ---
    const container = document.getElementById('main-slider');
    const cardsContainer = document.getElementById('hero-cards');
    const sideNavLinks = document.getElementById('side-nav-links');
    
    ALGOS.forEach((algo, index) => {
      // Generate Side Nav Item
      const navItem = document.createElement('div');
      navItem.className = 'side-nav-item';
      navItem.style.setProperty('--nav-accent', ACCENTS[algo.id]);
      navItem.textContent = algo.name;
      navItem.onclick = () => jumpToSection(index);
      navItem.dataset.index = index;
      sideNavLinks.appendChild(navItem);
      // 1. Generate Hover Card
      const card = document.createElement('div');
      card.className = 'hero-card';
      card.style.setProperty('--card-accent', ACCENTS[algo.id]);
      card.innerHTML = `
        <div class="hero-card-title">${algo.name}</div>
        <div class="hero-card-sub">${algo.badge}</div>
      `;
      card.onclick = () => jumpToSection(index);
      cardsContainer.appendChild(card);

      // 2. Generate Section (Keep existing section.innerHTML code!)
      const section = document.createElement('section');
      section.id = `sec-${algo.id}`;
      section.className = 'algo-section';
      section.dataset.algo = algo.id;
      
      section.innerHTML = `
        <div class="section-header">
          <div class="algo-dot"></div>
          <div class="section-title-wrap">
            <h2>${algo.name} <span class="algo-badge">${algo.badge}</span></h2>
            <p>${algo.desc}</p>
          </div>
        </div>
        <div class="split-layout">
          <div class="panel">
            <div class="panel-header">Performance History</div>
            <div class="chart-container">
              <canvas id="chart-${algo.id}"></canvas>
            </div>
          </div>
          <div class="panel">
            <div class="panel-header">Live Simulation</div>
            <div class="game-container">
              <canvas id="canvas-${algo.id}" width="${CANVAS_PX}" height="${CANVAS_PX}" class="game-canvas"></canvas>
            </div>
            <div class="controls">
              <button class="btn btn-play" id="play-${algo.id}" onclick="window.startAlgo('${algo.id}')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Play
              </button>
              <button class="btn btn-stop" id="stop-${algo.id}" onclick="window.stopAlgo('${algo.id}')" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg> Stop
              </button>
              <select class="speed-select" id="speed-${algo.id}" onchange="window.setSpeed('${algo.id}', this.value)">
                <option value="1">1x Speed</option>
                <option value="2">2x Speed</option>
                <option value="10" selected>10x Speed</option>
                <option value="50">50x Speed</option>
              </select>
            </div>
            <div class="stat-cards">
              <div class="stat-card">
                <div class="stat-label">Game No</div>
                <div class="stat-value" id="stat-game-${algo.id}">0</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="stat-score-${algo.id}">0</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Record</div>
                <div class="stat-value" id="stat-record-${algo.id}">0</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">${algo.statLabel}</div>
                <div class="stat-value accent" id="stat-algostat-${algo.id}">0</div>
              </div>
            </div>
          </div>
        </div>
      `;
      container.appendChild(section);
    });

    // --- Canvas Renderer ---
    function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function renderFrame(ctx, frameData, accentColor) {
        // 1. Fill background #0a0a0c
        ctx.fillStyle = '#0a0a0c';
        ctx.fillRect(0, 0, CANVAS_PX, CANVAS_PX);
        
        // 2. Draw grid lines (0.5px, #111118)
        ctx.strokeStyle = '#111118';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= GRID_SIZE; i++) {
            const pos = i * CELL_PX;
            ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, CANVAS_PX); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(CANVAS_PX, pos); ctx.stroke();
        }

        const drawCell = (x, y, color) => {
            if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) return; // boundary safeguard
            ctx.fillStyle = color;
            ctx.fillRect(x * CELL_PX + 1, y * CELL_PX + 1, CELL_PX - 2, CELL_PX - 2);
        };

        // 3. Draw explored cells (accent color at 12% opacity)
        if (frameData.explored && frameData.explored.length > 0) {
            const clr = hexToRgba(accentColor, 0.12);
            frameData.explored.forEach(([x, y]) => drawCell(x, y, clr));
        }

        // 4. Draw path cells (accent color at 25% opacity)
        if (frameData.path && frameData.path.length > 0) {
            const clr = hexToRgba(accentColor, 0.25);
            frameData.path.forEach(([x, y]) => drawCell(x, y, clr));
        }

        // 5. & 6. Draw snake
        if (frameData.snake && frameData.snake.length > 0) {
            const len = frameData.snake.length;
            frameData.snake.forEach(([x, y], i) => {
                if (i === 0) {
                    // Head: full accent + 2 white eye dots
                    drawCell(x, y, accentColor);
                    
                    // compute eye positions based on body direction
                    const cx = x * CELL_PX + CELL_PX/2;
                    const cy = y * CELL_PX + CELL_PX/2;
                    ctx.fillStyle = 'white';
                    ctx.beginPath(); ctx.arc(cx - 3, cy - 3, 2, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx + 3, cy - 3, 2, 0, Math.PI * 2); ctx.fill();
                } else {
                    // Body: accent color at decreasing opacity (1.0 -> 0.4)
                    const op = 1.0 - (0.6 * (Number(i) / (len - 1 || 1)));
                    drawCell(x, y, hexToRgba(accentColor, op));
                }
            });
        }

        // 7. Draw food: red circle (#ff4444) with small highlight dot
        if (frameData.food) {
            const [x, y] = frameData.food;
            const cx = x * CELL_PX + CELL_PX / 2;
            const cy = y * CELL_PX + CELL_PX / 2;
            ctx.fillStyle = '#ff4444';
            ctx.beginPath(); ctx.arc(cx, cy, CELL_PX / 2 - 2, 0, Math.PI * 2); ctx.fill();
            
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(cx - 3, cy - 3, 2, 0, Math.PI * 2); ctx.fill();
        }
    }

    // --- Chart & WebSocket Managers ---
    const charts = {};
    const wsConnections = {};

    function initChart(algoId, accentColor) {
        const ctx = document.getElementById(`chart-${algoId}`).getContext('2d');
        charts[algoId] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'Score',
                        data: [],
                        borderColor: accentColor,
                        backgroundColor: hexToRgba(accentColor, 0.1),
                        borderWidth: 2,
                        fill: true,
                        tension: 0.2, // smoother line
                        pointRadius: 0
                    },
                    {
                        label: 'Mean Score',
                        data: [],
                        borderColor: hexToRgba(accentColor, 0.6),
                        borderWidth: 2,
                        borderDash: [5, 5],
                        fill: false,
                        tension: 0.2,
                        pointRadius: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                scales: {
                    x: {
                        title: { display: true, text: 'Games', color: '#888899' },
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#888899', maxTicksLimit: 10 }
                    },
                    y: {
                        beginAtZero: true,
                        title: { display: true, text: 'Score', color: '#888899' },
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#888899' },
                        suggestedMax: 50 // initial scale up to sensible number
                    }
                },
                plugins: { legend: { labels: { color: '#e2e2ec' } } }
            }
        });
    }

    class WSManager {
        constructor(algoId) {
            this.algoId = algoId;
            this.ws = null;
            this.accentColor = ACCENTS[algoId];
            this.canvasCtx = document.getElementById(`canvas-${algoId}`).getContext('2d');
            this.chart = charts[algoId];
            this.gameDataBuffer = [];
        }

        connect(speed) {
            const url = `ws://${window.location.host}/ws/${this.algoId}`;
            this.ws = new WebSocket(url);

            this.ws.onopen = () => {
                const msg = { type: "start", algo: this.algoId, speed: parseInt(speed) };
                this.ws.send(JSON.stringify(msg));
                this.updateUI(true);
            };

            this.ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'step') {
                    // 1. Draw frame
                    renderFrame(this.canvasCtx, data, this.accentColor);
                    
                    // 2. Update stats
                    document.getElementById(`stat-game-${this.algoId}`).textContent = data.game_no;
                    document.getElementById(`stat-score-${this.algoId}`).textContent = data.score;
                    document.getElementById(`stat-record-${this.algoId}`).textContent = data.record;
                    if(data.algo_stat) {
                        let v = data.algo_stat.value;
                        if (typeof v === 'number' && !Number.isInteger(v)) v = v.toFixed(2);
                        document.getElementById(`stat-algostat-${this.algoId}`).textContent = v;
                    }

                    // 3. Update chart if game done
                    if (data.done) {
                        const scoreData = this.chart.data.datasets[0].data;
                        const meanData = this.chart.data.datasets[1].data;
                        const labels = this.chart.data.labels;

                        labels.push(data.game_no);
                        scoreData.push(data.score);
                        meanData.push(data.mean_score);

                        // keep last 150 points for performance
                        if (labels.length > 150) {
                            labels.shift(); scoreData.shift(); meanData.shift();
                        }
                        this.chart.update();
                    }
                }
            };

            this.ws.onclose = () => { this.updateUI(false); this.ws = null; };
            this.ws.onerror = (err) => console.error(`[${this.algoId}] WS Error:`, err);
        }

        disconnect() {
            if (this.ws) {
                this.ws.send(JSON.stringify({ type: "stop" }));
                this.ws.close();
            }
        }

        setSpeed(newSpeed) {
            if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                this.ws.send(JSON.stringify({ type: "set_speed", speed: parseInt(newSpeed) }));
            }
        }

        updateUI(isPlaying) {
            document.getElementById(`play-${this.algoId}`).disabled = isPlaying;
            document.getElementById(`stop-${this.algoId}`).disabled = !isPlaying;
        }
    }

    // Attach to window so buttons can trigger them
    window.startAlgo = (algoId) => {
        if (!wsConnections[algoId]) wsConnections[algoId] = new WSManager(algoId);
        const speed = document.getElementById(`speed-${algoId}`).value;
        wsConnections[algoId].connect(speed);
    };

    window.stopAlgo = (algoId) => {
        if (wsConnections[algoId]) wsConnections[algoId].disconnect();
    };

    window.setSpeed = (algoId, speed) => {
        if (wsConnections[algoId]) wsConnections[algoId].setSpeed(speed);
    };

    // --- Init: Render blank boards, setup observers, and reset backend ---
    ALGOS.forEach(algo => {
        initChart(algo.id, ACCENTS[algo.id]);
        const ctx = document.getElementById(`canvas-${algo.id}`).getContext('2d');
        renderFrame(ctx, {}, ACCENTS[algo.id]);
        
        // Wipe saved backend data so stats start at 0 on every refresh
        fetch(`/model/reset/${algo.id}`, { method: 'POST' }).catch(err => console.error('Reset failed:', err));
    });




  // ── Scrollytelling & Locked L-Shape Scroll ──────────────────────────
  gsap.registerPlugin(ScrollTrigger);

  const HERO_LINES = ['#hl-eyebrow', '#hl-1', '#hl-2', '#hl-3', '#hl-4'];
  let revealIndex = 0;
  let cardsRevealed = false;
  let currentSlide = -1; // -1 is Hero, 0-6 are Algo sections
  let scrollCooldown = false;

  const progressBar = document.getElementById('hero-progress-bar');
  const appContainer = document.getElementById('app-container');
  const slider = document.getElementById('main-slider');
  // cardsContainer already declared above

  // Fade in first lines automatically
  setTimeout(() => { revealNext(); setTimeout(() => revealNext(), 500); }, 300);

  function revealNext() {
    if (revealIndex === 0) {
      gsap.to('#hero-video', { opacity: 0.55, duration: 1.5, ease: 'power2.out' });
      gsap.to('#hero-overlay', { opacity: 1, duration: 1.5, ease: 'power2.out' });
    }

    if (revealIndex < HERO_LINES.length) {
      const el = document.querySelector(HERO_LINES[revealIndex]);
      gsap.to(el, { opacity: 1, y: 0, duration: 0.75, ease: 'power3.out' });
      revealIndex++;
      progressBar.style.width = (revealIndex / HERO_LINES.length) * 100 + '%';
    } 
    
    if (revealIndex >= HERO_LINES.length && !cardsRevealed) {
      revealCards();
    }
  }

  function revealCards() {
    if (cardsRevealed) return;
    cardsRevealed = true;
    gsap.to(cardsContainer, { opacity: 1, duration: 0.5 });
    gsap.to('.hero-card', { 
      opacity: 1, 
      y: 0, 
      stagger: 0.1, 
      duration: 0.6, 
      ease: 'back.out(1.7)',
      onComplete: () => cardsContainer.style.pointerEvents = 'all'
    });
  }

  // Called by clicking a card
  window.jumpToSection = (index) => {
    cardsRevealed = true; // Ensure logic doesn't break if clicked early
    currentSlide = index;
    updateSlider();
  };

  function updateSlider() {
    const sideNav = document.getElementById('side-nav');
    const navItems = document.querySelectorAll('.side-nav-item');

    if (currentSlide === -1) {
      // Show Hero (Vertical Scroll Up)
      appContainer.style.transform = `translateY(0)`;
      sideNav.classList.remove('active');
    } else {
      // Show Sections (Vertical Scroll Down, then Horizontal)
      appContainer.style.transform = `translateY(-100vh)`;
      slider.style.transform = `translateX(-${currentSlide * 100}vw)`;
      sideNav.classList.add('active');
      
      // Update active state on nav items
      navItems.forEach(item => {
        if (parseInt(item.dataset.index) === currentSlide) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
    }
  }

  function handleScroll(direction) {
    if (scrollCooldown) return;

    if (currentSlide === -1) {
      // In Hero Section
      if (direction > 0) {
        if (!cardsRevealed) {
          triggerCooldown(550);
          revealNext();
        } else {
          // Cards are shown, slide DOWN to first algo
          triggerCooldown(1000);
          currentSlide = 0;
          updateSlider();
        }
      }
    } else {
      // In Slider Sections
      triggerCooldown(1000); 
      if (direction > 0 && currentSlide < ALGOS.length - 1) {
        currentSlide++; // Slide Left
      } else if (direction < 0) {
        currentSlide--; // Slide Right (or Up back to Hero)
      }
      updateSlider();
    }
  }

  function triggerCooldown(ms) {
    scrollCooldown = true;
    setTimeout(() => { scrollCooldown = false; }, ms);
  }

  // Input Listeners
  window.addEventListener('wheel', (e) => {
    e.preventDefault(); 
    // Lowered threshold from 20 to 5 to fix trackpad locking
    if (Math.abs(e.deltaY) > 5) handleScroll(e.deltaY); 
  }, { passive: false });

  let _touchY = 0;
  let _touchX = 0;
  window.addEventListener('touchstart', (e) => {
    _touchY = e.touches[0].clientY;
    _touchX = e.touches[0].clientX;
  }, { passive: true });

  window.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const deltaY = _touchY - e.touches[0].clientY;
    const deltaX = _touchX - e.touches[0].clientX;
    
    // Support both vertical and horizontal swiping on mobile
    if (Math.abs(deltaY) > Math.abs(deltaX)) {
      if (Math.abs(deltaY) > 30) handleScroll(deltaY);
    } else {
      if (Math.abs(deltaX) > 30) handleScroll(deltaX);
    }
  }, { passive: false });

  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ') {
      e.preventDefault(); handleScroll(1);
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      e.preventDefault(); handleScroll(-1);
    }
  });

  </script>
</body>
